new-session -s main -n opencode -d 'opencode'
new-window -t main -n zsh
select-window -t main:1

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -s escape-time 0
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -n S-Left previous-window
bind -n S-Right next-window

bind n new-window -c "#{pane_current_path}"
bind x kill-pane

# Layout: nvim (60%) | opencode (40%) on top, terminal (100%) on bottom
bind-key L run-shell 'tmux split-window -v -p 30; \
  tmux select-pane -U; \
  tmux split-window -h -p 40; \
  tmux select-pane -L; \
  tmux send-keys "nvim" C-m; \
  tmux select-pane -R; \
  tmux send-keys "opencode" C-m; \
  tmux select-pane -D'

# Alternative: manual setup with percentages
# Top row: 60% nvim, 40% opencode | Bottom: 100% terminal
bind-key M-l run-shell 'tmux split-window -v -l 30%; \
  tmux select-pane -U; \
  tmux split-window -h -l 40%; \
  tmux swap-pane -U; \
  tmux send-keys "nvim" C-m; \
  tmux select-pane -R; \
  tmux send-keys "opencode" C-m; \
  tmux select-pane -D'

set -g status-interval 2
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#1e1e2e]"
set -g status-right-length 100
set -g status-right "#[fg=#45475a]#[fg=#cdd6f4,bg=#45475a]  #(free -h | awk '/^Mem:/ {print $3\"/\"$2}') #[fg=#585b70,bg=#45475a]#[fg=#cdd6f4,bg=#585b70]  #(top -bn1 | grep 'Cpu(s)' | awk '{print 100-$8\"%%\"}') #[fg=#89b4fa,bg=#585b70]#[fg=#1e1e2e,bg=#89b4fa,bold]  %H:%M "
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W #[fg=#a6e3a1,bg=#1e1e2e]"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "fg=#1e1e2e,bg=#a6e3a1,bold"

if-shell -b 'test -n "$WSLENV"' 'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel clip.exe'
if-shell -b 'test -n "$WSLENV"' 'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel clip.exe'
